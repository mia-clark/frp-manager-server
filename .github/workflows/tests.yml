name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: build (linux/amd64 static)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o bin/frpmgrd ./cmd/frpmgrd
          file bin/frpmgrd

      - name: smoke run --version
        run: ./bin/frpmgrd version

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: frpmgrd-linux-amd64
          path: bin/frpmgrd
          retention-days: 7
